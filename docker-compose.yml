# OutlabsAuth Infrastructure Services
#
# This provides PostgreSQL and Redis for local development.
# Examples are run directly via UV (not Docker).
#
# Usage:
#   docker compose up -d              # Start PostgreSQL + Redis
#   docker compose down               # Stop services
#   docker compose down -v            # Stop and remove volumes
#
# Running Examples (after starting infrastructure):
#   cd examples/simple_rbac
#   python reset_test_env.py          # Create test data
#   uv run uvicorn main:app --port 8003 --reload
#
# For Observability (optional):
#   docker compose -f docker-compose.observability.yml up -d
#   # Access Grafana at http://localhost:3011

services:
  # PostgreSQL - Primary database
  postgres:
    image: postgres:16
    container_name: outlabs-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - outlabs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Caching and activity tracking
  redis:
    image: redis:latest
    container_name: outlabs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - outlabs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  outlabs:
    driver: bridge
    name: outlabs-network

volumes:
  postgres-data:
    name: outlabs-postgres-data
  redis-data:
    name: outlabs-redis-data
