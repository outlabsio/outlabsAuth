services:
  api:
    build: .
    container_name: outlabs_auth_api
    ports:
      - "8030:8030"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=mongodb://host.docker.internal:27017
      - MONGO_DATABASE=outlabsAuth
      - REDIS_URL=redis://:guest@host.docker.internal:6379
      - SECRET_KEY=c3c1e8e8a0e8asdsdfaeasdf87878e8a0e8e8d0a2
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=30
      - ALGORITHM=HS256
    command: uvicorn api.main:app --host 0.0.0.0 --port 8030 --reload

