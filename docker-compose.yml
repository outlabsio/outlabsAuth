version: "3.8"

services:
  api:
    build: .
    container_name: outlabs_auth_api
    ports:
      - "8030:8030"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=mongodb://mongo:27017
      - MONGO_DATABASE=outlabsAuth
      - SECRET_KEY=a_very_secret_key_that_should_be_changed_in_production
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ALGORITHM=HS256
    depends_on:
      - mongo
    command: uvicorn api.main:app --host 0.0.0.0 --port 8030 --reload

  mongo:
    image: mongo:8.0
    container_name: outlabs_auth_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=outlabsAuth

volumes:
  mongo-data:
