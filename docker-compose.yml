version: "3.8"

services:
  api:
    build: .
    container_name: outlabs_auth_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=mongodb://mongo:27017
      - MONGO_INITDB_DATABASE=outlabsAuth
    depends_on:
      - mongo
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  mongo:
    image: mongo:latest
    container_name: outlabs_auth_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=outlabsAuth

volumes:
  mongo-data:
