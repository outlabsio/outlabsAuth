services:
  api:
    build:
      context: ../..
      dockerfile: examples/enterprise_rbac/Dockerfile
    container_name: outlabsauth_api
    ports:
      - "8002:8002"
    volumes:
      # Mount library code for hot reload (NOT read-only!)
      - ../../outlabs_auth:/app/outlabs_auth
      # Mount example app for hot reload
      - ../../examples/enterprise_rbac:/app/examples/enterprise_rbac
    environment:
      # MongoDB connection (connects to host's MongoDB via host.docker.internal)
      - MONGODB_URL=mongodb://host.docker.internal:27017
      - DATABASE_NAME=realestate_leads_platform

      # JWT configuration
      - SECRET_KEY=development-secret-key-change-in-production

      # Redis connection (connects to host's Redis)
      - REDIS_URL=redis://:guest@host.docker.internal:6379
      - REDIS_PASSWORD=guest

      # Python environment
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    working_dir: /app/examples/enterprise_rbac
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8002 --reload --reload-dir /app/outlabs_auth --reload-dir /app/examples/enterprise_rbac
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8002/')"]
      interval: 30s
      timeout: 10s
      retries: 3
