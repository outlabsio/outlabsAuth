services:
  api:
    build:
      context: ../..
      dockerfile: examples/simple_rbac/Dockerfile
    container_name: outlabsauth_simple_api
    ports:
      - "8003:8003"
    volumes:
      # Mount library code for hot reload (NOT read-only!)
      - ../../outlabs_auth:/app/outlabs_auth
      # Mount example app for hot reload
      - ../../examples/simple_rbac:/app/examples/simple_rbac
    environment:
      # MongoDB connection (connects to host's MongoDB via host.docker.internal)
      - MONGODB_URL=mongodb://host.docker.internal:27017
      - DATABASE_NAME=blog_simple_rbac

      # JWT configuration
      - SECRET_KEY=development-secret-key-change-in-production

      # Port configuration
      - PORT=8003

      # Python environment
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    working_dir: /app/examples/simple_rbac
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8003 --reload --reload-dir /app/outlabs_auth --reload-dir /app/examples/simple_rbac
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8003/')"]
      interval: 30s
      timeout: 10s
      retries: 3
