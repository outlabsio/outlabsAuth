# Prometheus Configuration for OutlabsAuth Examples
#
# This configuration scrapes metrics from OutlabsAuth example applications
# running on the host machine (via UV, not Docker).
#
# Prerequisites:
#   - Run your example app with metrics enabled
#   - Apps expose /metrics endpoint (Prometheus format)
#
# Example:
#   cd examples/simple_rbac
#   uv run uvicorn main:app --port 8003 --reload

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # SimpleRBAC Example (Blog API) - running on host port 8003
  - job_name: "simple-rbac"
    static_configs:
      - targets: ["host.docker.internal:8003"]
        labels:
          app: "outlabs-simple-rbac"
          preset: "SimpleRBAC"
          example: "blog"
    scrape_interval: 10s
    metrics_path: "/metrics"

  # EnterpriseRBAC Example (Real Estate API) - running on host port 8004
  - job_name: "enterprise-rbac"
    static_configs:
      - targets: ["host.docker.internal:8004"]
        labels:
          app: "outlabs-enterprise-rbac"
          preset: "EnterpriseRBAC"
          example: "real-estate"
    scrape_interval: 10s
    metrics_path: "/metrics"

  # Notifications Example - running on host port 8005
  - job_name: "notifications"
    static_configs:
      - targets: ["host.docker.internal:8005"]
        labels:
          app: "outlabs-notifications"
          example: "notifications"
    scrape_interval: 10s
    metrics_path: "/metrics"
