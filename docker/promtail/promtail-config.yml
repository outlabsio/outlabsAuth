server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers in the outlabs network
      - source_labels: ['__meta_docker_network_name']
        regex: 'outlabs-network'
        action: keep

      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Extract service name from container labels
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      # Set job label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'job'

      # Extract compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'

    pipeline_stages:
      # Parse JSON logs from OutlabsAuth (when ENV=production)
      - json:
          expressions:
            timestamp: timestamp
            level: level
            event: event
            user_id: user_id
            error_type: error_type
            error_message: error_message
            endpoint: endpoint
            correlation_id: correlation_id

      # Extract timestamp from JSON if available
      - timestamp:
          source: timestamp
          format: RFC3339
          fallback_formats:
            - "2006-01-02T15:04:05.000Z"

      # Add labels from parsed JSON
      - labels:
          level:
          event:
          error_type:
          endpoint:

      # Add label for log type
      - static_labels:
          log_type: application
