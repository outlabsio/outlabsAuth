[project]
name = "outlabsAuth"
version = "0.1.0"
description = "A standalone, generic Role-Based Access Control (RBAC) microservice."
authors = []
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "pydantic>=2.0.0",
    "uvicorn[standard]",
    "beanie==1.30.0",
    "passlib[bcrypt]",
    "python-jose[cryptography]",
    "python-multipart",
    "redis",
    "email-validator",
    "pydantic-settings",
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-asyncio",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["api"]