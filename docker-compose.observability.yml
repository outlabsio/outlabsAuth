# =============================================================================
# DEPRECATED - Use observability/ folder instead
# =============================================================================
#
# This file is kept for backwards compatibility but is no longer maintained.
#
# The new portable observability stack is in the observability/ folder:
#
#   cd observability
#   cp .env.example .env
#   ./setup.sh
#   docker compose up -d
#
# Or use the start script:
#
#   uv run start.py
#   # Select "obs" to start observability
#
# The new stack is:
#   - Parameterized via .env file
#   - Portable (copy to any project)
#   - Auto-configured for your API port
#
# =============================================================================
# LEGACY CONFIG BELOW (for backwards compatibility)
# =============================================================================
#
# This stack provides observability tooling for local development.
# It's separate from the main docker-compose.yml to keep things simple.
#
# Prerequisites:
#   - Run your example app on the host (e.g., uv run uvicorn main:app --port 8003)
#   - Apps expose /metrics endpoint for Prometheus scraping
#
# Usage:
#   docker compose -f docker-compose.observability.yml up -d     # Start observability
#   docker compose -f docker-compose.observability.yml down      # Stop observability
#   docker compose -f docker-compose.observability.yml down -v   # Stop and remove volumes
#
# Access:
#   - Grafana: http://localhost:3011 (admin/admin)
#   - Prometheus: http://localhost:9090
#   - Loki: http://localhost:3100
#   - Tempo: http://localhost:3200

services:
  # ============================================================================
  # Metrics Collection
  # ============================================================================

  # Prometheus - Scrapes metrics from apps running on host
  prometheus:
    image: prom/prometheus:latest
    container_name: outlabs-prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - observability
    restart: unless-stopped

  # ============================================================================
  # Visualization
  # ============================================================================

  # Grafana - Dashboards for metrics, logs, and traces
  grafana:
    image: grafana/grafana:latest
    container_name: outlabs-grafana
    ports:
      - "3011:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3011
      - GF_FEATURE_TOGGLES_ENABLE=tempoSearch,tempoBackendSearch
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - observability
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo

  # ============================================================================
  # Log Aggregation
  # ============================================================================

  # Loki - Log aggregation (like Elasticsearch for logs, but lighter)
  loki:
    image: grafana/loki:latest
    container_name: outlabs-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - observability
    restart: unless-stopped

  # Promtail - Log shipper (sends logs from containers to Loki)
  # Note: This scrapes Docker container logs, so it's useful if you run apps in Docker
  promtail:
    image: grafana/promtail:latest
    container_name: outlabs-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability
    restart: unless-stopped
    depends_on:
      - loki

  # ============================================================================
  # Distributed Tracing
  # ============================================================================

  # Tempo - Distributed tracing backend
  tempo:
    image: grafana/tempo:latest
    container_name: outlabs-tempo
    user: "0:0"
    ports:
      - "3200:3200" # Tempo HTTP API
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    networks:
      - observability
    restart: unless-stopped

networks:
  observability:
    driver: bridge
    name: outlabs-observability

volumes:
  prometheus-data:
    name: outlabs-prometheus-data
  grafana-data:
    name: outlabs-grafana-data
  loki-data:
    name: outlabs-loki-data
  tempo-data:
    name: outlabs-tempo-data
