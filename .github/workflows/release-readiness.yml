name: Release Readiness

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"

jobs:
  library:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: outlabs_auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d outlabs_auth_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/outlabs_auth_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Verify release metadata
        run: uv run python scripts/release_version.py check

      - name: Run release packaging and bootstrap tests
        run: uv run --extra test python -m pytest tests/unit/test_release_packaging.py tests/unit/test_bootstrap.py -q

      - name: Verify packaged CLI migration flow
        run: uv run --extra test python -m pytest tests/integration/test_packaged_cli_migrations.py -q

      - name: Build distributions
        run: uv build --no-sources

      - name: Verify CLI version command
        run: uv run outlabs-auth --version

  auth-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-ui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install UI dependencies
        run: bun ci

      - name: Build admin UI
        run: bun run build
