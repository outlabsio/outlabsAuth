name: Release Readiness

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"

jobs:
  library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Verify release metadata
        run: uv run python scripts/release_version.py check

      - name: Run release packaging tests
        run: uv run --extra test python -m pytest tests/unit/test_release_packaging.py -q

      - name: Build distributions
        run: uv build --no-sources

      - name: Verify CLI version command
        run: uv run outlabs-auth --version

  auth-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-ui
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install UI dependencies
        run: bun ci

      - name: Build admin UI
        run: bun run build
