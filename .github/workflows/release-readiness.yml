name: Release Readiness

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  library:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: outlabs_auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d outlabs_auth_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/outlabs_auth_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Verify release metadata
        run: uv run python scripts/release_version.py check

      - name: Run release packaging and bootstrap tests
        run: uv run --extra test python -m pytest tests/unit/test_release_packaging.py tests/unit/test_bootstrap.py -q

      - name: Verify packaged CLI migration flow
        run: uv run --extra test python -m pytest tests/integration/test_packaged_cli_migrations.py -q

      - name: Build distributions
        run: uv build --no-sources

      - name: Verify CLI version command
        run: uv run outlabs-auth --version

  # The complete library test suite, with BOTH backing services. Without the
  # Redis service every cache/budget/invalidation test skips silently, so the
  # caching layer would ship unexercised by CI.
  full-suite:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: outlabs_auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d outlabs_auth_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/outlabs_auth_test
      TEST_REDIS_URL: redis://127.0.0.1:6379/15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Run full test suite (Postgres + Redis)
        run: uv run --extra all --extra test python -m pytest -q

  # Black-box validation of the RUNNING EnterpriseRBAC example over HTTP:
  # seed -> boot uvicorn -> admin/ABAC smoke -> 45-check assertion suite ->
  # teardown. See docs/PRIVATE_RELEASE.md "API Integration Validation".
  api-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: realestate_enterprise_rbac
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d realestate_enterprise_rbac"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/realestate_enterprise_rbac
      REDIS_URL: redis://127.0.0.1:6379/14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # The seed, the app, and the checks only need to SHARE a key for the
      # job's lifetime — generate one per run instead of committing a
      # secret-shaped string for scanners to flag.
      - name: Generate ephemeral SECRET_KEY
        run: echo "SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_urlsafe(48))')" >> "$GITHUB_ENV"

      - name: Run API integration suite (seed, boot, smoke, 45 checks)
        run: uv run python scripts/run_enterprise_example_smoke.py
